<VirtualHost *:80>
    ServerName tonpi.local
    ServerAlias tonpi

    # Redirect HTTP to HTTPS
    RewriteEngine On
    RewriteCond %{HTTPS} off
    RewriteRule ^(.*)$ https://%{HTTP_HOST}%{REQUEST_URI} [L,R=301]
</VirtualHost>

<VirtualHost *:443>
    ServerName tonpi.local
    ServerAlias tonpi

    # SSL Configuration
    SSLEngine on
    SSLCertificateFile /etc/ssl/certs/ssl-cert-snakeoil.pem
    SSLCertificateKeyFile /etc/ssl/private/ssl-cert-snakeoil.key

    # Proxy to Laravel application
    ProxyPass / http://127.0.0.1:8000/
    ProxyPassReverse / http://127.0.0.1:8000/

    # WebSocket proxy for Livewire
    ProxyPass /livewire ws://127.0.0.1:8000/livewire
    ProxyPassReverse /livewire ws://127.0.0.1:8000/livewire

    # Headers for proper proxy operation
    RequestHeader set X-Forwarded-Proto "https"
    RequestHeader set X-Forwarded-Port "443"

    # Security headers
    Header always set X-Frame-Options DENY
    Header always set X-Content-Type-Options nosniff
    Header always set Referrer-Policy "strict-origin-when-cross-origin"

    # Logging
    ErrorLog ${APACHE_LOG_DIR}/tonpi_error.log
    CustomLog ${APACHE_LOG_DIR}/tonpi_access.log combined

    # Directory permissions
    <Directory />
        Require all granted
    </Directory>
</VirtualHost>