# Alternative Apache-Konfiguration: Direkt auf public-Verzeichnis zeigen
# (anstatt Reverse-Proxy zu Laravel auf Port 8000)

<VirtualHost *:80>
    ServerName tonpi.local
    ServerAlias tonpi

    # DocumentRoot auf public-Verzeichnis setzen
    DocumentRoot /home/hendrik/TonPI/public

    # PHP über FPM verarbeiten (falls installiert)
    <FilesMatch \.php$>
        SetHandler "proxy:unix:/var/run/php/php8.4-fpm.sock|fcgi://localhost/"
    </FilesMatch>

    # Directory-Index
    DirectoryIndex index.php

    # Zugriff auf public-Verzeichnis erlauben
    <Directory /home/hendrik/TonPI/public>
        AllowOverride All
        Require all granted
    </Directory>

    # Storage-Verzeichnis schützen
    <Directory /home/hendrik/TonPI/storage>
        Require all denied
    </Directory>

    # Logging
    ErrorLog ${APACHE_LOG_DIR}/tonpi_error.log
    CustomLog ${APACHE_LOG_DIR}/tonpi_access.log combined
</VirtualHost>

<VirtualHost *:443>
    ServerName tonpi.local
    ServerAlias tonpi

    # SSL Configuration
    SSLEngine on
    SSLCertificateFile /etc/ssl/certs/ssl-cert-snakeoil.pem
    SSLCertificateKeyFile /etc/ssl/private/ssl-cert-snakeoil.key

    # DocumentRoot auf public-Verzeichnis setzen
    DocumentRoot /home/hendrik/TonPI/public

    # PHP über FPM verarbeiten
    <FilesMatch \.php$>
        SetHandler "proxy:unix:/var/run/php/php8.4-fpm.sock|fcgi://localhost/"
    </FilesMatch>

    # Directory-Index
    DirectoryIndex index.php

    # Zugriff auf public-Verzeichnis erlauben
    <Directory /home/hendrik/TonPI/public>
        AllowOverride All
        Require all granted
    </Directory>

    # Storage-Verzeichnis schützen
    <Directory /home/hendrik/TonPI/storage>
        Require all denied
    </Directory>

    # Logging
    ErrorLog ${APACHE_LOG_DIR}/tonpi_error.log
    CustomLog ${APACHE_LOG_DIR}/tonpi_access.log combined
</VirtualHost>